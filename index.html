<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Interactive Video Gallery</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden;
            background: #000;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        /* ============================================ */
        /* MAIN CONTAINER - Maintains aspect ratio */
        /* ============================================ */
        #canvas-container {
            position: relative;
            width: 100vw;
            height: 100vh;
            max-width: 100vw;
            max-height: 100vh;
            overflow: hidden;
        }

        /* For 16:9 background video, use this aspect ratio */
        @media (min-aspect-ratio: 16/9) {
            #canvas-container {
                width: 100vw;
                height: calc(100vw * 9 / 16);
                max-height: 100vh;
            }
        }

        @media (max-aspect-ratio: 16/9) {
            #canvas-container {
                width: calc(100vh * 16 / 9);
                height: 100vh;
                max-width: 100vw;
            }
        }

        /* BACKGROUND VIDEO */
        #bg-video {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            z-index: 1;
        }

        /* DARK OVERLAY */
        .overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.5);
            z-index: 2;
        }

        /* TITLE */
        .title {
            position: absolute;
            top: 5%;
            left: 50%;
            transform: translateX(-50%);
            color: white;
            font-size: 3vw;
            text-shadow: 0 0 20px rgba(0,0,0,0.9);
            z-index: 10;
            text-align: center;
            white-space: nowrap;
        }

        /* VIDEO THUMBNAILS - Positioned relative to container */
        .video-point {
            position: absolute;
            cursor: pointer;
            border-radius: 1vw;
            overflow: hidden;
            box-shadow: 0 0.5vw 2vw rgba(0, 0, 0, 0.6);
            transition: all 0.3s ease;
            border: 0.2vw solid rgba(255, 255, 255, 0.3);
            background: rgba(0, 0, 0, 0.6);
            z-index: 5;
        }

        .video-point:hover {
            transform: scale(1.1);
            box-shadow: 0 1vw 3vw rgba(0, 0, 0, 0.8);
            border-color: rgba(255, 255, 255, 0.9);
            z-index: 100;
        }

        .video-point video,
        .video-point img {
            width: 15vw;
            height: 9vw;
            object-fit: cover;
            display: block;
            pointer-events: none;
        }

        .video-point .label {
            padding: 0.5vw;
            color: white;
            text-align: center;
            font-size: 1vw;
            font-weight: bold;
            text-shadow: 1px 1px 3px rgba(0,0,0,0.9);
        }

        .video-point .youtube-badge {
            position: absolute;
            top: 0.5vw;
            right: 0.5vw;
            background: #ff0000;
            color: white;
            padding: 0.3vw 0.6vw;
            border-radius: 0.3vw;
            font-size: 0.8vw;
            font-weight: bold;
        }

        /* STILL IMAGES */
        .image-point {
            position: absolute;
            cursor: pointer;
            border-radius: 1vw;
            overflow: hidden;
            box-shadow: 0 0.5vw 2vw rgba(0, 0, 0, 0.6);
            transition: all 0.3s ease;
            border: 0.2vw solid rgba(255, 255, 255, 0.3);
            z-index: 5;
        }

        .image-point:hover {
            transform: scale(1.15);
            box-shadow: 0 1vw 3vw rgba(255, 255, 255, 0.3);
            border-color: rgba(255, 255, 255, 0.9);
            z-index: 100;
        }

        .image-point img {
            width: 13vw;
            height: 9vw;
            object-fit: cover;
            display: block;
        }

        /* LIGHTBOX */
        #lightbox {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.95);
            z-index: 1000;
            justify-content: center;
            align-items: center;
            cursor: pointer;
        }

        #lightbox.active {
            display: flex;
        }

        #lightbox img {
            max-width: 90%;
            max-height: 90%;
            object-fit: contain;
            border-radius: 8px;
        }

        #lightbox .close {
            position: absolute;
            top: 20px;
            right: 40px;
            color: white;
            font-size: 50px;
            cursor: pointer;
        }

        /* ============================================ */
        /* MOBILE RESPONSIVE */
        /* ============================================ */
        @media screen and (max-width: 768px) {
            body {
                overflow-y: auto;
            }

            #canvas-container {
                width: 100vw !important;
                height: auto !important;
                max-width: 100vw !important;
                max-height: none !important;
                display: flex;
                flex-direction: column;
                align-items: center;
                padding: 80px 15px 40px;
                gap: 25px;
            }

            #bg-video {
                display: none;
            }

            .overlay {
                background: rgba(0, 0, 0, 0.8);
            }

            .video-point,
            .image-point {
                position: relative !important;
                top: auto !important;
                left: auto !important;
                right: auto !important;
                bottom: auto !important;
                transform: none !important;
                width: 100%;
                max-width: 350px;
            }

            .video-point video,
            .video-point img {
                width: 100%;
                height: auto;
                aspect-ratio: 16/9;
            }

            .image-point img {
                width: 100%;
                height: auto;
                aspect-ratio: 3/2;
            }

            .video-point .label {
                font-size: 16px;
                padding: 12px;
            }

            .title {
                font-size: 1.8rem;
                position: fixed;
                top: 20px;
            }
        }
    </style>
</head>
<body>

    <div id="canvas-container">

        <!-- BACKGROUND VIDEO -->
        <video autoplay muted loop playsinline id="bg-video">
            <source src="videos/background.mp4" type="video/mp4">
        </video>

        <div class="overlay"></div>
        <div class="title">My Interactive Gallery</div>

        <!-- VIDEO 1 -->
        <a href="videos/CHRISTMAS_1999.mp4" target="_blank" class="video-point" style="top: 15%; right: 25%;">
            <video autoplay muted loop playsinline>
                <source src="videos/CHRISTMAS_1999-preview.mp4" type="video/mp4">
            </video>
            <div class="label">Video 1 (GitHub)</div>
        </a>

        <!-- VIDEO 2 - YouTube -->
        <a href="https://youtu.be/emsv37wae2Q?si=f0ULXBEOjLetJ-qd" target="_blank" class="video-point" style="top: 55%; left: 15%;">
            <video autoplay muted loop playsinline>
                <source src="videos/Los_Angeles-preview.mp4" type="video/mp4">
            </video>
            <div class="youtube-badge">YouTube</div>
            <div class="label">Video 2 (YouTube)</div>
        </a>

        <!-- VIDEO 3 - YouTube -->
        <a href="https://youtu.be/2CaAso4sAxE?si=JCAM4FiooLhpX0pR" target="_blank" class="video-point" style="top: 50%; left: 50%;">
            <video autoplay muted loop playsinline>
                <source src="videos/Kansas_City-preview.mp4" type="video/mp4">
            </video>
            <div class="youtube-badge">YouTube</div>
            <div class="label">Video 3 (YouTube)</div>
        </a>

        <!-- VIDEO 4 -->
        <a href="videos/Milford.mp4" target="_blank" class="video-point" style="top: 10%; right: 8%;">
            <video autoplay muted loop playsinline>
                <source src="videos/Milford-preview.mp4" type="video/mp4">
            </video>
            <div class="label">Video 4 (GitHub)</div>
        </a>
        <!-- VIDEO 5 -->
        <a href="videos/July_4th_2001.mp4" target="_blank" class="video-point" style="top: 30%; right: 10%;">
            <video autoplay muted loop playsinline>
                <source src="videos/JULY_4TH_2001-preview.mp4" type="video/mp4">
            </video>
            <div class="label">Video 5 (GitHub)</div>
        </a>

        <!-- VIDEO 6 - YouTube -->
        <a href="ttps://youtu.be/1NM_v4d41qI?si=caDSOuO3W9DEXrmJ" target="_blank" class="video-point" style="top: 15%; left: 15%; transform: translateX(-50%);">
            <video autoplay muted loop playsinline>
                <source src="videos/San_Francisco-preview.mp4" type="video/mp4">
            </video>
            <div class="youtube-badge">YouTube</div>
            <div class="label">Video 6 (YouTube)</div>
        </a>

        <!-- STILL IMAGE 1 - Position: 35% from top, centered -->
        <div class="image-point" style="top: 35%; left: 50%; transform: translateX(-50%);" onclick="openLightbox('images/image1-full.jpg')">
            <img src="images/image1-thumb.jpg" alt="Image 1">
        </div>

        <!-- STILL IMAGE 2 - Position: 65% from top, 30% from left -->
        <div class="image-point" style="top: 65%; left: 30%;" onclick="openLightbox('images/image2-full.jpg')">
            <img src="images/image2-thumb.jpg" alt="Image 2">
        </div>

        <!-- STILL IMAGE 3 - Position: 65% from top, 30% from right -->
        <div class="image-point" style="top: 65%; right: 30%;" onclick="openLightbox('images/image3-full.jpg')">
            <img src="images/image3-thumb.jpg" alt="Image 3">
        </div>

    </div>

    <!-- LIGHTBOX -->
    <div id="lightbox" onclick="closeLightbox()">
        <span class="close">&times;</span>
        <img id="lightbox-img" src="" alt="Full size">
    </div>

    <script>
        function openLightbox(imageSrc) {
            document.getElementById('lightbox-img').src = imageSrc;
            document.getElementById('lightbox').classList.add('active');
        }

        function closeLightbox() {
            document.getElementById('lightbox').classList.remove('active');
        }

        document.addEventListener('keydown', function(e) {
            if (e.key === 'Escape') {
                closeLightbox();
            }
        });

        // Pause/play preview videos on hover
        document.querySelectorAll('.video-point video').forEach(video => {
            const parent = video.closest('.video-point');
            parent.addEventListener('mouseenter', () => video.play());
            parent.addEventListener('mouseleave', () => video.pause());
        });
    </script>

</body>
</html>
