<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Interactive Video Gallery</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden;
            background: #000;
        }

        /* BACKGROUND VIDEO */
        #bg-video {
            position: fixed;
            top: 50%;
            left: 50%;
            min-width: 100%;
            min-height: 100%;
            width: auto;
            height: auto;
            z-index: -2;
            transform: translate(-50%, -50%);
            object-fit: cover;
        }

        /* DARK OVERLAY */
        .overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.5);
            z-index: -1;
        }

        /* MAIN CONTAINER */
        #canvas-container {
            position: relative;
            width: 100vw;
            height: 100vh;
            overflow: hidden;
        }

        /* VIDEO THUMBNAILS */
        .video-point {
            position: absolute;
            cursor: pointer;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.6);
            transition: all 0.3s ease;
            border: 3px solid rgba(255, 255, 255, 0.3);
            background: rgba(0, 0, 0, 0.6);
        }

        .video-point:hover {
            transform: scale(1.1);
            box-shadow: 0 12px 40px rgba(0, 0, 0, 0.8);
            border-color: rgba(255, 255, 255, 0.9);
            z-index: 100;
        }

        .video-point video,
        .video-point img {
            width: 200px;
            height: 120px;
            object-fit: cover;
            display: block;
            pointer-events: none;
        }

        .video-point .label {
            padding: 8px;
            color: white;
            text-align: center;
            font-size: 14px;
            font-weight: bold;
            text-shadow: 1px 1px 3px rgba(0,0,0,0.9);
        }

        .video-point .youtube-badge {
            position: absolute;
            top: 5px;
            right: 5px;
            background: #ff0000;
            color: white;
            padding: 3px 8px;
            border-radius: 4px;
            font-size: 11px;
            font-weight: bold;
        }

        /* STILL IMAGES */
        .image-point {
            position: absolute;
            cursor: pointer;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.6);
            transition: all 0.3s ease;
            border: 3px solid rgba(255, 255, 255, 0.3);
        }

        .image-point:hover {
            transform: scale(1.15);
            box-shadow: 0 12px 40px rgba(255, 255, 255, 0.3);
            border-color: rgba(255, 255, 255, 0.9);
            z-index: 100;
        }

        .image-point img {
            width: 180px;
            height: 120px;
            object-fit: cover;
            display: block;
        }

        /* LIGHTBOX */
        #lightbox {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.95);
            z-index: 1000;
            justify-content: center;
            align-items: center;
            cursor: pointer;
        }

        #lightbox.active {
            display: flex;
        }

        #lightbox img {
            max-width: 90%;
            max-height: 90%;
            object-fit: contain;
            border-radius: 8px;
        }

        #lightbox .close {
            position: absolute;
            top: 20px;
            right: 40px;
            color: white;
            font-size: 50px;
            cursor: pointer;
        }

        /* TITLE */
        .title {
            position: absolute;
            top: 30px;
            left: 50%;
            transform: translateX(-50%);
            color: white;
            font-size: 2.5rem;
            text-shadow: 0 0 20px rgba(0,0,0,0.9);
            z-index: 50;
            text-align: center;
        }
    </style>
</head>
<body>

    <!-- BACKGROUND VIDEO -->
    <video autoplay muted loop playsinline id="bg-video">
        <source src="videos/background.mp4" type="video/mp4">
    </video>

    <div class="overlay"></div>
    <div class="title">My Interactive Gallery</div>

    <div id="canvas-container">

        <!-- ============================================ -->
        <!-- GITHUB-HOSTED VIDEO (small file) -->
        <!-- ============================================ -->
        <a href="videos/Milford.mp4" target="_blank" class="video-point" style="top: 15%; left: 10%;">
            <video autoplay muted loop playsinline>
                <source src="videos/Milford-preview.mp4" type="video/mp4">
            </video>
            <div class="label">Video 1 (GitHub)</div>
        </a>

        <!-- ============================================ -->
        <!-- YOUTUBE VIDEO (large file - uses YouTube) -->
        <!-- ============================================ -->
        <a href="https://youtu.be/emsv37wae2Q?si=f0ULXBEOjLetJ-qd" target="_blank" class="video-point" style="top: 15%; right: 10%;">
            <!-- Option 1: Use YouTube thumbnail -->
            <img src="https://img.youtube.com/vi/dQw4w9WgXcQ/hqdefault.jpg" alt="Video 2">
            <!-- Option 2: Use a small preview video from GitHub -->
            <!-- <video autoplay muted loop playsinline>
                <source src="videos/video2-preview.mp4" type="video/mp4">
            </video> -->
            <div class="youtube-badge">YouTube</div>
            <div class="label">Video 2 (YouTube)</div>
        </a>

        <!-- ============================================ -->
        <!-- ANOTHER YOUTUBE VIDEO -->
        <!-- ============================================ -->
        <a href="https://youtu.be/2CaAso4sAxE?si=3Er9jj6cho55dn77" target="_blank" class="video-point" style="top: 50%; left: 8%;">
            <img src="https://img.youtube.com/vi/9bZkp7q19f0/hqdefault.jpg" alt="Video 3">
            <div class="youtube-badge">YouTube</div>
            <div class="label">Video 3 (YouTube)</div>
        </a>

        <!-- ============================================ -->
        <!-- GITHUB-HOSTED VIDEO -->
        <!-- ============================================ -->
        <a href="videos/CHRISTMAS_1999.mp4" target="_blank" class="video-point" style="top: 50%; right: 8%;">
            <video autoplay muted loop playsinline>
                <source src="videos/CHRISTMAS_1999-preview.mp4" type="video/mp4">
            </video>
            <div class="label">Video 4 (GitHub)</div>
        </a>
        <!-- ============================================ -->
        <!-- GITHUB-HOSTED VIDEO -->
        <!-- ============================================ -->
        <a href="videos/JULY_4TH_2001.mp4" target="_blank" class="video-point" style="top: 50%; right: 8%;">
            <video autoplay muted loop playsinline>
                <source src="videos/JULY_4TH_2001-preview.mp4" type="video/mp4">
            </video>
            <div class="label">Video 4 (GitHub)</div>
        </a>
        <!-- ============================================ -->
        <!-- ANOTHER YOUTUBE VIDEO -->
        <!-- ============================================ -->
        <a href="https://www.youtube.com/watch?v=3JZ_D3ELwOQ" target="_blank" class="video-point" style="bottom: 15%; left: 50%; transform: translateX(-50%);">
            <img src="https://img.youtube.com/vi/3JZ_D3ELwOQ/hqdefault.jpg" alt="Video 5">
            <div class="youtube-badge">YouTube</div>
            <div class="label">Video 5 (YouTube)</div>
        </a>

        <!-- STILL IMAGES -->
        <div class="image-point" style="top: 35%; left: 50%; transform: translateX(-50%);" onclick="openLightbox('images/image1-full.jpg')">
            <img src="images/image1-thumb.jpg" alt="Image 1">
        </div>

        <div class="image-point" style="bottom: 35%; left: 30%;" onclick="openLightbox('images/image2-full.jpg')">
            <img src="images/image2-thumb.jpg" alt="Image 2">
        </div>

        <div class="image-point" style="bottom: 35%; right: 30%;" onclick="openLightbox('images/image3-full.jpg')">
            <img src="images/image3-thumb.jpg" alt="Image 3">
        </div>

    </div>

    <!-- LIGHTBOX -->
    <div id="lightbox" onclick="closeLightbox()">
        <span class="close">&times;</span>
        <img id="lightbox-img" src="" alt="Full size">
    </div>

    <script>
        function openLightbox(imageSrc) {
            document.getElementById('lightbox-img').src = imageSrc;
            document.getElementById('lightbox').classList.add('active');
        }

        function closeLightbox() {
            document.getElementById('lightbox').classList.remove('active');
        }

        document.addEventListener('keydown', function(e) {
            if (e.key === 'Escape') {
                closeLightbox();
            }
        });

        // Pause/play preview videos on hover
        document.querySelectorAll('.video-point video').forEach(video => {
            const parent = video.closest('.video-point');
            parent.addEventListener('mouseenter', () => video.play());
            parent.addEventListener('mouseleave', () => video.pause());
        });
    </script>

</body>
</html>
