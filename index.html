<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Celebration of Joyce Lorraine Douglas</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow-x: hidden;
            background: #000;
        }

        /* BACKGROUND VIDEO */
/* BACKGROUND VIDEO - Shows full video without cropping */
#bg-video {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    z-index: -2;
    object-fit: contain;
    background: #000;
}

/* DARK OVERLAY */
.overlay {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: rgba(0, 0, 0, 0.0);
    z-index: -1;
    pointer-events: none;
}

        /* MAIN CONTAINER */
        #canvas-container {
            position: relative;
            width: 100vw;
            min-height: 100vh;
            overflow: visible;
            padding: 20px;
        }

        /* VIDEO THUMBNAILS - DESKTOP DEFAULT */
        .video-point {
            position: absolute;
            cursor: pointer;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.6);
            transition: all 0.3s ease;
            border: 3px solid rgba(255, 255, 255, 0.3);
            background: rgba(0, 0, 0, 0.6);
        }

        .video-point:hover {
            transform: scale(1.1);
            box-shadow: 0 12px 40px rgba(0, 0, 0, 0.8);
            border-color: rgba(255, 255, 255, 0.9);
            z-index: 100;
        }

        .video-point video,
        .video-point img {
            width: 200px;
            height: 120px;
            object-fit: cover;
            display: block;
            pointer-events: none;
        }

        .video-point .label {
            padding: 8px;
            color: white;
            text-align: center;
            font-size: 14px;
            font-weight: bold;
            text-shadow: 1px 1px 3px rgba(0,0,0,0.9);
        }

        .video-point .youtube-badge {
            position: absolute;
            top: 5px;
            right: 5px;
            background: #ff0000;
            color: white;
            padding: 3px 8px;
            border-radius: 4px;
            font-size: 11px;
            font-weight: bold;
        }

        /* STILL IMAGES - DESKTOP DEFAULT */
        .image-point {
            position: absolute;
            cursor: pointer;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.6);
            transition: all 0.3s ease;
            border: 3px solid rgba(255, 255, 255, 0.3);
        }

        .image-point:hover {
            transform: scale(1.15);
            box-shadow: 0 12px 40px rgba(255, 255, 255, 0.3);
            border-color: rgba(255, 255, 255, 0.9);
            z-index: 100;
        }

        .image-point img {
            width: 180px;
            height: 120px;
            object-fit: cover;
            display: block;
        }

        /* TITLE */
        .title {
            position: absolute;
            top: 30px;
            left: 50%;
            transform: translateX(-50%);
            color: white;
            font-size: 2.5rem;
            text-shadow: 0 0 20px rgba(0,0,0,0.9);
            z-index: 50;
            text-align: center;
            width: 100%;
        }

        /* LIGHTBOX */
        #lightbox {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.95);
            z-index: 1000;
            justify-content: center;
            align-items: center;
            cursor: pointer;
        }

        #lightbox.active {
            display: flex;
        }

        #lightbox img {
            max-width: 90%;
            max-height: 90%;
            object-fit: contain;
            border-radius: 8px;
        }

        #lightbox .close {
            position: absolute;
            top: 20px;
            right: 40px;
            color: white;
            font-size: 50px;
            cursor: pointer;
        }

        /* ============================================ */
        /* TABLET RESPONSIVE (max-width: 1024px) */
        /* ============================================ */
        @media screen and (max-width: 1024px) {
            .video-point video,
            .video-point img {
                width: 160px;
                height: 100px;
            }

            .image-point img {
                width: 150px;
                height: 100px;
            }

            .title {
                font-size: 2rem;
                top: 20px;
            }
        }

        /* ============================================ */
        /* MOBILE RESPONSIVE (max-width: 768px) */
        /* ============================================ */
        @media screen and (max-width: 768px) {
            /* Hide background video on mobile for performance */
            #bg-video {
                display: none;
            }
            
            /* Darker overlay as fallback */
            .overlay {
                background: rgba(0, 0, 0, 0.8);
            }

            /* Change to relative positioning for mobile */
            #canvas-container {
                position: relative;
                display: flex;
                flex-direction: column;
                align-items: center;
                padding: 80px 15px 40px;
                gap: 25px;
            }

            /* Reset all absolute positioning for mobile */
            .video-point,
            .image-point {
                position: relative !important;
                top: auto !important;
                left: auto !important;
                right: auto !important;
                bottom: auto !important;
                transform: none !important;
                width: 100%;
                max-width: 350px;
            }

            /* Smaller thumbnails on mobile */
            .video-point video,
            .video-point img {
                width: 100%;
                height: auto;
                aspect-ratio: 16/9;
            }

            .image-point img {
                width: 100%;
                height: auto;
                aspect-ratio: 3/2;
            }

            .video-point .label {
                font-size: 16px;
                padding: 12px;
            }

            /* Smaller title on mobile */
            .title {
                font-size: 1.8rem;
                top: 20px;
                padding: 0 20px;
            }

            /* Adjust lightbox for mobile */
            #lightbox .close {
                top: 15px;
                right: 20px;
                font-size: 40px;
            }
        }

        /* ============================================ */
        /* SMALL MOBILE (max-width: 480px) */
        /* ============================================ */
        @media screen and (max-width: 480px) {
            .title {
                font-size: 1.5rem;
            }

            .video-point .label {
                font-size: 14px;
            }

            #canvas-container {
                gap: 20px;
                padding: 70px 10px 30px;
            }
        }
    </style>
</head>
<body>

    <!-- BACKGROUND VIDEO -->
    <video autoplay muted loop playsinline id="bg-video">
        <source src="videos/background.mp4" type="video/mp4">
    </video>

    <div class="overlay"></div>
    <div class="title">Celebration of Joyce Lorraine Douglas</div>

    <div id="canvas-container">

        <!-- VIDEO 1 -->
        <a href="videos/CHRISTMAS_1999.mp4" target="_blank" class="video-point" style="top: 15%; left: 10%;">
            <video autoplay muted loop playsinline>
                <source src="videos/CHRISTMAS_1999-preview.mp4" type="video/mp4">
            </video>
            <div class="label">Video 1 (GitHub)</div>
        </a>

        <!-- VIDEO 2 - YouTube -->
        <a href="https://www.youtube.com/watch?v=dQw4w9WgXcQ" target="_blank" class="video-point" style="top: 15%; right: 10%;">
            <video autoplay muted loop playsinline>
                <source src="videos/Los_Angeles-preview.mp4" type="video/mp4">
            </video>
            <div class="youtube-badge">YouTube</div>
            <div class="label">Video 2 (YouTube)</div>
        </a>

        <!-- VIDEO 3 - YouTube -->
        <a href="https://www.youtube.com/watch?v=9bZkp7q19f0" target="_blank" class="video-point" style="top: 50%; left: 8%;">
            <img src="https://img.youtube.com/vi/9bZkp7q19f0/hqdefault.jpg" alt="Video 3">
            <div class="youtube-badge">YouTube</div>
            <div class="label">Video 3 (YouTube)</div>
        </a>

        <!-- VIDEO 4 -->
        <a href="videos/Milford.mp4" target="_blank" class="video-point" style="top: 50%; right: 8%;">
            <video autoplay muted loop playsinline>
                <source src="videos/Milford-preview.mp4" type="video/mp4">
            </video>
            <div class="label">Video 4 (GitHub)</div>
        </a>

        <!-- VIDEO 5 - YouTube -->
        <a href="https://www.youtube.com/watch?v=3JZ_D3ELwOQ" target="_blank" class="video-point" style="bottom: 15%; left: 50%; transform: translateX(-50%);">
            <img src="https://img.youtube.com/vi/3JZ_D3ELwOQ/hqdefault.jpg" alt="Video 5">
            <div class="youtube-badge">YouTube</div>
            <div class="label">Video 5 (YouTube)</div>
        </a>

        <!-- STILL IMAGE 1 -->
        <div class="image-point" style="top: 35%; left: 50%; transform: translateX(-50%);" onclick="openLightbox('images/image1-full.jpg')">
            <img src="images/image1-thumb.jpg" alt="Image 1">
        </div>

        <!-- STILL IMAGE 2 -->
        <div class="image-point" style="bottom: 35%; left: 30%;" onclick="openLightbox('images/image2-full.jpg')">
            <img src="images/image2-thumb.jpg" alt="Image 2">
        </div>

        <!-- STILL IMAGE 3 -->
        <div class="image-point" style="bottom: 35%; right: 30%;" onclick="openLightbox('images/image3-full.jpg')">
            <img src="images/image3-thumb.jpg" alt="Image 3">
        </div>

    </div>

    <!-- LIGHTBOX -->
    <div id="lightbox" onclick="closeLightbox()">
        <span class="close">&times;</span>
        <img id="lightbox-img" src="" alt="Full size">
    </div>

    <script>
        function openLightbox(imageSrc) {
            document.getElementById('lightbox-img').src = imageSrc;
            document.getElementById('lightbox').classList.add('active');
        }

        function closeLightbox() {
            document.getElementById('lightbox').classList.remove('active');
        }

        document.addEventListener('keydown', function(e) {
            if (e.key === 'Escape') {
                closeLightbox();
            }
        });

        // Pause/play preview videos on hover/touch
        document.querySelectorAll('.video-point video').forEach(video => {
            const parent = video.closest('.video-point');
            parent.addEventListener('mouseenter', () => video.play());
            parent.addEventListener('mouseleave', () => video.pause());
            
            // Touch support for mobile
            parent.addEventListener('touchstart', () => {
                if (video.paused) {
                    video.play();
                } else {
                    video.pause();
                }
            });
        });
    </script>

</body>
</html>
