<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Interactive Video Gallery</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden;
            background: #000;
        }

        /* BACKGROUND VIDEO - Shows full video */
        #bg-video {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            object-fit: contain;
            z-index: 1;
        }

        /* DARK OVERLAY */
        .overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.5);
            z-index: 2;
            pointer-events: none;
        }

        /* TITLE */
        .title {
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            color: white;
            font-size: 2.5rem;
            text-shadow: 0 0 20px rgba(0,0,0,0.9);
            z-index: 10;
            text-align: center;
        }

        /* VIDEO THUMBNAILS */
        .video-point {
            position: fixed;
            cursor: pointer;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.6);
            transition: all 0.3s ease;
            border: 3px solid rgba(255, 255, 255, 0.3);
            background: rgba(0, 0, 0, 0.6);
            z-index: 5;
        }

        .video-point:hover {
            transform: scale(1.1);
            box-shadow: 0 12px 40px rgba(0, 0, 0, 0.8);
            border-color: rgba(255, 255, 255, 0.9);
            z-index: 100;
        }

        .video-point video,
        .video-point img {
            width: 200px;
            height: 120px;
            object-fit: cover;
            display: block;
            pointer-events: none;
        }

        .video-point .label {
            padding: 8px;
            color: white;
            text-align: center;
            font-size: 14px;
            font-weight: bold;
            text-shadow: 1px 1px 3px rgba(0,0,0,0.9);
        }

        .video-point .youtube-badge {
            position: absolute;
            top: 5px;
            right: 5px;
            background: #ff0000;
            color: white;
            padding: 3px 8px;
            border-radius: 4px;
            font-size: 11px;
            font-weight: bold;
        }

        /* STILL IMAGES */
        .image-point {
            position: fixed;
            cursor: pointer;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.6);
            transition: all 0.3s ease;
            border: 3px solid rgba(255, 255, 255, 0.3);
            z-index: 5;
        }

        .image-point:hover {
            transform: scale(1.15);
            box-shadow: 0 12px 40px rgba(255, 255, 255, 0.3);
            border-color: rgba(255, 255, 255, 0.9);
            z-index: 100;
        }

        .image-point img {
            width: 180px;
            height: 120px;
            object-fit: cover;
            display: block;
        }

        /* LIGHTBOX */
        #lightbox {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.95);
            z-index: 1000;
            justify-content: center;
            align-items: center;
            cursor: pointer;
        }

        #lightbox.active {
            display: flex;
        }

        #lightbox img {
            max-width: 90%;
            max-height: 90%;
            object-fit: contain;
            border-radius: 8px;
        }

        #lightbox .close {
            position: absolute;
            top: 20px;
            right: 40px;
            color: white;
            font-size: 50px;
            cursor: pointer;
        }

        /* MOBILE RESPONSIVE */
        @media screen and (max-width: 768px) {
            body {
                overflow-y: auto;
            }

            #bg-video {
                display: none;
            }

            .overlay {
                background: rgba(0, 0, 0, 0.8);
            }

            .title {
                position: fixed;
                font-size: 1.8rem;
            }

            .video-point,
            .image-point {
                position: relative !important;
                top: auto !important;
                left: auto !important;
                right: auto !important;
                bottom: auto !important;
                transform: none !important;
                width: 90%;
                max-width: 350px;
                margin: 0 auto 25px;
                display: block;
            }

            .video-point video,
            .video-point img {
                width: 100%;
                height: auto;
                aspect-ratio: 16/9;
            }

            .image-point img {
                width: 100%;
                height: auto;
                aspect-ratio: 3/2;
            }

            .video-point .label {
                font-size: 16px;
                padding: 12px;
            }
        }
    </style>
</head>
<body>

    <!-- BACKGROUND VIDEO -->
    <video autoplay muted loop playsinline id="bg-video">
        <source src="videos/background.mp4" type="video/mp4">
    </video>

    <div class="overlay"></div>
    <div class="title">Celebration of the Life of Joyce Lorraine Douglas</div>

        <!-- VIDEO 1 -->
        <a href="videos/CHRISTMAS_1999.mp4" target="_blank" class="video-point" style="top: 15%; right: 25%;">
            <video autoplay muted loop playsinline>
                <source src="videos/CHRISTMAS_1999-preview.mp4" type="video/mp4">
            </video>
            <div class="label">Video 1 (GitHub)</div>
        </a>

        <!-- VIDEO 2 - YouTube -->
        <a href="https://youtu.be/emsv37wae2Q?si=f0ULXBEOjLetJ-qd" target="_blank" class="video-point" style="top: 55%; left: 15%;">
            <video autoplay muted loop playsinline>
                <source src="videos/Los_Angeles-preview.mp4" type="video/mp4">
            </video>
            <div class="youtube-badge">YouTube</div>
            <div class="label">Video 2 (YouTube)</div>
        </a>

        <!-- VIDEO 3 - YouTube -->
        <a href="https://youtu.be/2CaAso4sAxE?si=JCAM4FiooLhpX0pR" target="_blank" class="video-point" style="top: 50%; left: 50%;">
            <video autoplay muted loop playsinline>
                <source src="videos/Kansas_City-preview.mp4" type="video/mp4">
            </video>
            <div class="youtube-badge">YouTube</div>
            <div class="label">Video 3 (YouTube)</div>
        </a>

        <!-- VIDEO 4 -->
        <a href="videos/Milford.mp4" target="_blank" class="video-point" style="top: 10%; right: 8%;">
            <video autoplay muted loop playsinline>
                <source src="videos/Milford-preview.mp4" type="video/mp4">
            </video>
            <div class="label">Video 4 (GitHub)</div>
        </a>
        <!-- VIDEO 5 -->
        <a href="videos/July_4th_2001.mp4" target="_blank" class="video-point" style="top: 30%; right: 10%;">
            <video autoplay muted loop playsinline>
                <source src="videos/JULY_4TH_2001-preview.mp4" type="video/mp4">
            </video>
            <div class="label">Video 5 (GitHub)</div>
        </a>

        <!-- VIDEO 6 - YouTube -->
        <a href="ttps://youtu.be/1NM_v4d41qI?si=caDSOuO3W9DEXrmJ" target="_blank" class="video-point" style="top: 15%; left: 15%; transform: translateX(-50%);">
            <video autoplay muted loop playsinline>
                <source src="videos/San_Francisco-preview.mp4" type="video/mp4">
            </video>
            <div class="youtube-badge">YouTube</div>
            <div class="label">Video 6 (YouTube)</div>
        </a>

    <!-- STILL IMAGE 1 -->
    <div class="image-point" data-x="45" data-y="35" onclick="openLightbox('images/bob_joyce_2010.jpg')">
        <img src="images/bob_joyce_2010.jpg" alt="Image 1">
    </div>

    <!-- STILL IMAGE 2 -->
    <div class="image-point" data-x="25" data-y="65" onclick="openLightbox('images/image2-full.jpg')">
        <img src="images/image2-thumb.jpg" alt="Image 2">
    </div>

    <!-- STILL IMAGE 3 -->
    <div class="image-point" data-x="65" data-y="65" onclick="openLightbox('images/image3-full.jpg')">
        <img src="images/image3-thumb.jpg" alt="Image 3">
    </div>

    <!-- LIGHTBOX -->
    <div id="lightbox" onclick="closeLightbox()">
        <span class="close">&times;</span>
        <img id="lightbox-img" src="" alt="Full size">
    </div>

    <script>
        // ============================================
        // DYNAMIC POSITIONING BASED ON VIDEO SIZE
        // ============================================
        
        const bgVideo = document.getElementById('bg-video');
        const videoPoints = document.querySelectorAll('.video-point');
        const imagePoints = document.querySelectorAll('.image-point');

        function positionElements() {
            // Get the actual rendered size and position of the video
            const videoRect = bgVideo.getBoundingClientRect();
            
            // Calculate the actual video area (excluding black bars)
            const videoWidth = videoRect.width;
            const videoHeight = videoRect.height;
            const videoLeft = videoRect.left;
            const videoTop = videoRect.top;

            // Position video thumbnails
            videoPoints.forEach(point => {
                const xPercent = parseFloat(point.dataset.x);
                const yPercent = parseFloat(point.dataset.y);
                
                const x = videoLeft + (videoWidth * xPercent / 100);
                const y = videoTop + (videoHeight * yPercent / 100);
                
                point.style.left = x + 'px';
                point.style.top = y + 'px';
                point.style.transform = 'translate(-50%, -50%)';
            });

            // Position image thumbnails
            imagePoints.forEach(point => {
                const xPercent = parseFloat(point.dataset.x);
                const yPercent = parseFloat(point.dataset.y);
                
                const x = videoLeft + (videoWidth * xPercent / 100);
                const y = videoTop + (videoHeight * yPercent / 100);
                
                point.style.left = x + 'px';
                point.style.top = y + 'px';
                point.style.transform = 'translate(-50%, -50%)';
            });
        }

        // Position on load
        window.addEventListener('load', positionElements);
        
        // Reposition on resize
        window.addEventListener('resize', positionElements);
        
        // Reposition when video metadata loads
        bgVideo.addEventListener('loadedmetadata', positionElements);

        // ============================================
        // LIGHTBOX FUNCTIONALITY
        // ============================================
        
        function openLightbox(imageSrc) {
            document.getElementById('lightbox-img').src = imageSrc;
            document.getElementById('lightbox').classList.add('active');
        }

        function closeLightbox() {
            document.getElementById('lightbox').classList.remove('active');
        }

        document.addEventListener('keydown', function(e) {
            if (e.key === 'Escape') {
                closeLightbox();
            }
        });

        // ============================================
        // VIDEO HOVER EFFECTS
        // ============================================
        
        document.querySelectorAll('.video-point video').forEach(video => {
            const parent = video.closest('.video-point');
            parent.addEventListener('mouseenter', () => video.play());
            parent.addEventListener('mouseleave', () => video.pause());
        });
    </script>

</body>
</html>
